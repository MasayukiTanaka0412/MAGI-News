# サイトの基本設定
title: MAGI-News
description: ニュースアーカイブサイト
baseurl: "/MAGI-News"
url: "https://MasayukiTanaka0412.github.io"

# ビルド設定
markdown: kramdown
theme: minima
future: true
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# パーマリンク設定
permalink: /:year/:month/:day/:title/

# 除外設定
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# デフォルト設定
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"