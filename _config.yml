# サイトの基本設定
title: MAGI-News
description: 日本とインドのニュースサイト
baseurl: "/MAGI-News"
url: "https://MasayukiTanaka0412.github.io"

# Google Analytics（実際のGA4測定IDに置き換えてください）
google_analytics: G-5HG7WGMYZC

# ビルド設定
markdown: kramdown
theme: minima
future: true
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# ナビゲーション
header_pages:
  - tags.html

# パーマリンク設定
permalink: /:year/:month/:day/:title/

# 除外設定
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# デフォルト設定
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
